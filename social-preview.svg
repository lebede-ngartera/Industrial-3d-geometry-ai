<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">GeoFusion AI Social Preview</title>
  <desc id="desc">A visual social preview for GeoFusion AI featuring warm industrial tones, abstract geometry, and collaboration messaging.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfaf7"/>
      <stop offset="100%" stop-color="#efe7d7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17212b"/>
      <stop offset="100%" stop-color="#2d4255"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4e7a63"/>
      <stop offset="100%" stop-color="#3d6287"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="120" cy="100" r="180" fill="#4e7a63" opacity="0.10"/>
  <circle cx="1150" cy="110" r="170" fill="#c77454" opacity="0.10"/>
  <circle cx="1040" cy="560" r="220" fill="#3d6287" opacity="0.08"/>

  <rect x="60" y="62" width="1160" height="516" rx="34" fill="#ffffff" opacity="0.72" stroke="#17212b" stroke-opacity="0.08"/>
  <rect x="110" y="120" width="620" height="400" rx="28" fill="url(#panel)"/>
  <rect x="770" y="120" width="390" height="180" rx="28" fill="#ffffff" opacity="0.92" stroke="#17212b" stroke-opacity="0.08"/>
  <rect x="770" y="326" width="390" height="194" rx="28" fill="#ffffff" opacity="0.92" stroke="#17212b" stroke-opacity="0.08"/>

  <g transform="translate(154 168)">
    <rect x="0" y="0" width="142" height="42" rx="21" fill="#f4efe7" opacity="0.14"/>
    <text x="24" y="28" fill="#b8d3c1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">GEOFUSION AI</text>

    <text x="0" y="116" fill="#f8f1e8" font-family="Georgia, Times New Roman, serif" font-size="68" font-weight="700">Industrial geometry</text>
    <text x="0" y="184" fill="#f8f1e8" font-family="Georgia, Times New Roman, serif" font-size="68" font-weight="700">intelligence that</text>
    <text x="0" y="252" fill="#f8f1e8" font-family="Georgia, Times New Roman, serif" font-size="68" font-weight="700">invites collaboration.</text>

    <text x="0" y="318" fill="#d9ddd9" font-family="Segoe UI, Arial, sans-serif" font-size="24">3D CAD understanding, multimodal retrieval, anomaly analysis,</text>
    <text x="0" y="352" fill="#d9ddd9" font-family="Segoe UI, Arial, sans-serif" font-size="24">and selective public storytelling for serious technical work.</text>
  </g>

  <g transform="translate(800 148)">
    <text x="0" y="26" fill="#4e7a63" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">PUBLIC SIGNAL</text>
    <text x="0" y="78" fill="#17212b" font-family="Georgia, Times New Roman, serif" font-size="36" font-weight="700">Built to open</text>
    <text x="0" y="118" fill="#17212b" font-family="Georgia, Times New Roman, serif" font-size="36" font-weight="700">the right doors.</text>
    <text x="0" y="154" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="20">Clear contact, strong architecture,</text>
    <text x="0" y="182" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="20">and trust-building technical depth.</text>
  </g>

  <g transform="translate(800 356)">
    <circle cx="74" cy="66" r="56" fill="url(#accent)" opacity="0.95"/>
    <circle cx="74" cy="66" r="34" fill="none" stroke="#ffffff" stroke-opacity="0.66"/>
    <rect x="158" y="18" width="192" height="40" rx="20" fill="#17212b"/>
    <text x="178" y="44" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">37 tests validated</text>
    <text x="158" y="96" fill="#17212b" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Contact</text>
    <text x="158" y="132" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="20">ngarteralebede12@gmail.com</text>
    <text x="158" y="164" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="20">lebede@terasystems.ai</text>
  </g>
</svg>