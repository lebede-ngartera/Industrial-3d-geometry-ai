  <text x="355" y="212" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#23416d">Sampling</text>
  <text x="355" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#23416d">Normalization and augment</text>

