  <text x="600" y="74" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4b5563">How the repository connects learning components to engineering use cases</text>

  <rect x="50" y="150" width="170" height="84" rx="16" fill="#ddeee3" stroke="#3d7a57" stroke-width="2"/>
