  <text x="135" y="212" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#214d37">ModelNet40</text>
  <text x="135" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#214d37">ShapeNet or custom files</text>

