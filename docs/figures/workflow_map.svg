  <text x="575" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6b4b16">DGCNN or text encoder</text>

  <rect x="710" y="150" width="170" height="84" rx="16" fill="#efe3ef" stroke="#7a4a7a" stroke-width="2"/>
