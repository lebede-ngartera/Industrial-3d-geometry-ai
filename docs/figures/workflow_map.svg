  <text x="750" y="422" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#5d335d">or suspicious part geometry</text>

  <rect x="900" y="340" width="220" height="88" rx="18" fill="#ffffff" stroke="#9a6b1f" stroke-width="2"/>
  <text x="1010" y="378" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#6b4b16">Design Exploration</text>
  <text x="1010" y="402" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6b4b16">Prototype generation and</text>
  <text x="1010" y="422" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6b4b16">property aware modeling hooks</text>

