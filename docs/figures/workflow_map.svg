  <text x="1040" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#343434">and generative exploration</text>

  <rect x="120" y="340" width="220" height="88" rx="18" fill="#ffffff" stroke="#3d7a57" stroke-width="2"/>
