  <text x="230" y="422" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#214d37">engineering shape libraries</text>

  <rect x="380" y="340" width="220" height="88" rx="18" fill="#ffffff" stroke="#325e9b" stroke-width="2"/>
  <text x="490" y="378" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#23416d">Engineering Search</text>
