<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="760" fill="#f8f7f2"/>
  <text x="700" y="52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#1f2937">Geometry Transform Gallery</text>
  <text x="700" y="82" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6470">A public visual motif inspired by the transform and representation views used across the project</text>

  <g transform="translate(70,130)">
    <rect width="280" height="250" rx="24" fill="#ffffff" stroke="#d6d3c8"/>
    <text x="24" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2937">Sphere</text>
    <text x="24" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6b7280">Raw and augmented point set intuition</text>
    <circle cx="100" cy="145" r="58" fill="none" stroke="#78a7d8" stroke-width="1.5" stroke-dasharray="2 6"/>
    <circle cx="195" cy="145" r="50" fill="none" stroke="#ff8f6b" stroke-width="1.5" stroke-dasharray="2 6"/>
    <g fill="#78a7d8">
      <circle cx="67" cy="121" r="2.3"/><circle cx="86" cy="98" r="2.1"/><circle cx="119" cy="95" r="2.2"/><circle cx="136" cy="122" r="2.2"/><circle cx="70" cy="153" r="2.1"/><circle cx="100" cy="170" r="2.0"/><circle cx="124" cy="151" r="2.0"/><circle cx="88" cy="192" r="2.2"/><circle cx="109" cy="114" r="2.1"/><circle cx="105" cy="145" r="2.4"/><circle cx="129" cy="178" r="2.1"/><circle cx="57" cy="139" r="2.1"/><circle cx="147" cy="143" r="2.0"/><circle cx="96" cy="78" r="2.0"/>
    </g>
    <g fill="#ff8f6b">
      <circle cx="165" cy="116" r="2.2"/><circle cx="191" cy="98" r="2.0"/><circle cx="220" cy="109" r="2.1"/><circle cx="234" cy="140" r="2.3"/><circle cx="161" cy="149" r="2.0"/><circle cx="182" cy="181" r="2.1"/><circle cx="204" cy="158" r="2.0"/><circle cx="220" cy="191" r="2.2"/><circle cx="199" cy="131" r="2.2"/><circle cx="210" cy="84" r="2.0"/><circle cx="151" cy="134" r="2.0"/><circle cx="242" cy="157" r="2.1"/>
    </g>
    <text x="24" y="222" font-family="Consolas, monospace" font-size="12" fill="#4b5563">FPS  Normalize  Rotate  Jitter  Scale</text>
  </g>

  <g transform="translate(390,130)">
    <rect width="280" height="250" rx="24" fill="#ffffff" stroke="#d6d3c8"/>
    <text x="24" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2937">Cube</text>
    <text x="24" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6b7280">Structured geometry with preserved edges</text>
    <rect x="62" y="92" width="86" height="86" fill="none" stroke="#78a7d8" stroke-width="1.5"/>
    <rect x="82" y="110" width="86" height="86" fill="none" stroke="#78a7d8" stroke-width="1.5"/>
    <line x1="62" y1="92" x2="82" y2="110" stroke="#78a7d8" stroke-width="1.5"/>
    <line x1="148" y1="92" x2="168" y2="110" stroke="#78a7d8" stroke-width="1.5"/>
    <line x1="62" y1="178" x2="82" y2="196" stroke="#78a7d8" stroke-width="1.5"/>
    <line x1="148" y1="178" x2="168" y2="196" stroke="#78a7d8" stroke-width="1.5"/>
    <rect x="174" y="118" width="70" height="70" transform="rotate(-12 209 153)" fill="none" stroke="#ff8f6b" stroke-width="1.5"/>
    <g fill="#78a7d8"><circle cx="76" cy="108" r="2"/><circle cx="92" cy="142" r="2"/><circle cx="117" cy="127" r="2"/><circle cx="133" cy="165" r="2"/><circle cx="100" cy="182" r="2"/><circle cx="156" cy="139" r="2"/></g>
    <g fill="#ff8f6b"><circle cx="182" cy="131" r="2"/><circle cx="210" cy="123" r="2"/><circle cx="231" cy="147" r="2"/><circle cx="193" cy="178" r="2"/><circle cx="222" cy="173" r="2"/></g>
    <text x="24" y="222" font-family="Consolas, monospace" font-size="12" fill="#4b5563">Edge aware transforms remain interpretable</text>
  </g>

  <g transform="translate(710,130)">
    <rect width="280" height="250" rx="24" fill="#ffffff" stroke="#d6d3c8"/>
    <text x="24" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2937">Cylinder</text>
    <text x="24" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6b7280">Continuous surfaces and rotational structure</text>
    <ellipse cx="100" cy="112" rx="46" ry="18" fill="none" stroke="#78a7d8" stroke-width="1.5"/>
    <ellipse cx="100" cy="186" rx="46" ry="18" fill="none" stroke="#78a7d8" stroke-width="1.5"/>
    <line x1="54" y1="112" x2="54" y2="186" stroke="#78a7d8" stroke-width="1.5"/>
    <line x1="146" y1="112" x2="146" y2="186" stroke="#78a7d8" stroke-width="1.5"/>
    <ellipse cx="202" cy="121" rx="38" ry="15" fill="none" stroke="#ff8f6b" stroke-width="1.5"/>
    <ellipse cx="202" cy="183" rx="38" ry="15" fill="none" stroke="#ff8f6b" stroke-width="1.5"/>
    <line x1="164" y1="121" x2="164" y2="183" stroke="#ff8f6b" stroke-width="1.5"/>
    <line x1="240" y1="121" x2="240" y2="183" stroke="#ff8f6b" stroke-width="1.5"/>
    <g fill="#78a7d8"><circle cx="71" cy="127" r="2"/><circle cx="87" cy="153" r="2"/><circle cx="119" cy="139" r="2"/><circle cx="131" cy="166" r="2"/><circle cx="99" cy="170" r="2"/></g>
    <g fill="#ff8f6b"><circle cx="178" cy="136" r="2"/><circle cx="203" cy="149" r="2"/><circle cx="219" cy="172" r="2"/><circle cx="232" cy="141" r="2"/></g>
    <text x="24" y="222" font-family="Consolas, monospace" font-size="12" fill="#4b5563">Useful for similarity and anomaly prototypes</text>
  </g>

  <g transform="translate(1030,130)">
    <rect width="300" height="250" rx="24" fill="#ffffff" stroke="#d6d3c8"/>
    <text x="24" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2937">Cone and SDF View</text>
    <text x="24" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6b7280">From simple shape intuition toward richer fields</text>
    <path d="M72 188 L124 100 L176 188 Z" fill="none" stroke="#78a7d8" stroke-width="1.6"/>
    <ellipse cx="124" cy="188" rx="52" ry="16" fill="none" stroke="#78a7d8" stroke-width="1.6"/>
    <g>
      <rect x="214" y="92" width="30" height="120" fill="url(#grad)" stroke="#999" stroke-width="0.5"/>
      <text x="258" y="102" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6b7280">SDF</text>
      <text x="252" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7280">positive</text>
      <text x="252" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7280">zero</text>
      <text x="252" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7280">negative</text>
    </g>
    <g fill="#ff8f6b"><circle cx="100" cy="151" r="2"/><circle cx="120" cy="132" r="2"/><circle cx="144" cy="160" r="2"/><circle cx="110" cy="183" r="2"/><circle cx="150" cy="183" r="2"/></g>
    <text x="24" y="222" font-family="Consolas, monospace" font-size="12" fill="#4b5563">A visual bridge from transforms to implicit reasoning</text>
  </g>

  <rect x="120" y="458" width="1160" height="210" rx="28" fill="#1f2937"/>
  <text x="160" y="512" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#f8f7f2">Built to invite conversation, not to exhaust the story</text>
  <text x="160" y="550" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d7dce2">The public visuals show how the system thinks about geometry, transforms, and workflows.</text>
  <text x="160" y="578" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d7dce2">They are meant to give visitors confidence, curiosity, and a reason to start a technical discussion.</text>
  <text x="160" y="626" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#aeb6c2">Public facing figures keep the repository memorable while preserving deeper case-study value for direct collaboration.</text>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c7bb6"/>
      <stop offset="50%" stop-color="#f8f7f2"/>
      <stop offset="100%" stop-color="#b40426"/>
    </linearGradient>
  </defs>
</svg>