<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Text to geometry retrieval output</title>
  <desc id="desc">Representative public figure showing a text prompt and retrieved candidate shapes.</desc>
  <rect width="1280" height="720" fill="#f6f3ec"/>
  <rect x="40" y="40" width="1200" height="640" rx="28" fill="#ffffff" stroke="#d8d2c7"/>
  <text x="80" y="100" fill="#17212b" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Text-to-Geometry Retrieval</text>
  <text x="80" y="136" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="20">Representative public output from the multimodal retrieval workflow</text>

  <rect x="80" y="180" width="1120" height="110" rx="24" fill="#17212b"/>
  <text x="110" y="225" fill="#b8d3c1" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">TEXT QUERY</text>
  <text x="110" y="265" fill="#f4efe7" font-family="Georgia, Times New Roman, serif" font-size="30">"lightweight bracket with curved support arm"</text>

  <g transform="translate(110 350)">
    <rect width="300" height="230" rx="24" fill="#f7f4ee" stroke="#d8d2c7"/>
    <text x="24" y="36" fill="#17212b" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Result 1</text>
    <text x="214" y="36" fill="#4e7a63" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">0.88</text>
    <path d="M72 160 C110 82, 188 82, 228 160" fill="none" stroke="#4e7a63" stroke-width="16" stroke-linecap="round"/>
    <rect x="128" y="110" width="48" height="120" rx="14" fill="#3d6287" opacity="0.72"/>
    <text x="44" y="205" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="18">curved support bracket</text>
  </g>
  <g transform="translate(490 350)">
    <rect width="300" height="230" rx="24" fill="#f7f4ee" stroke="#d8d2c7"/>
    <text x="24" y="36" fill="#17212b" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Result 2</text>
    <text x="214" y="36" fill="#4e7a63" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">0.84</text>
    <path d="M84 162 C126 96, 176 96, 220 162" fill="none" stroke="#c77454" stroke-width="16" stroke-linecap="round"/>
    <rect x="136" y="118" width="34" height="112" rx="12" fill="#4e7a63" opacity="0.72"/>
    <text x="52" y="205" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="18">lightweight brace variant</text>
  </g>
  <g transform="translate(870 350)">
    <rect width="300" height="230" rx="24" fill="#f7f4ee" stroke="#d8d2c7"/>
    <text x="24" y="36" fill="#17212b" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Result 3</text>
    <text x="214" y="36" fill="#4e7a63" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">0.81</text>
    <path d="M88 160 C128 106, 172 106, 212 160" fill="none" stroke="#3d6287" stroke-width="16" stroke-linecap="round"/>
    <circle cx="150" cy="180" r="20" fill="#c77454" opacity="0.74"/>
    <text x="52" y="205" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="18">arched mount assembly</text>
  </g>
</svg>