  <rect x="334" y="414" width="886" height="232" rx="24" fill="#fbfaf7" stroke="#d8d2c7"/>
  <text x="362" y="454" fill="#17212b" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Public Demo Modules</text>
  <text x="362" y="494" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="19">Transforms, classification, retrieval, anomaly scoring, and generation are exposed in one lightweight local interface.</text>
  <text x="362" y="530" fill="#5d6875" font-family="Segoe UI, Arial, sans-serif" font-size="19">The public version is intentionally optimized for clarity, reproducibility, and technical inspection.</text>
