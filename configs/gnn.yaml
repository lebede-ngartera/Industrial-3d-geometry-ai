# GNN Encoder Configuration
# ==========================

defaults:
  - default

geometry_encoder:
  backbone: "gnn"
  embed_dim: 256
  dropout: 0.3
  # GNN specific
  conv_type: "EdgeConv"  # EdgeConv, GATConv, SAGEConv
  num_layers: 4
  hidden_channels: [64, 128, 256, 512]
  k_neighbors: 20
  aggr: "max"
  use_edge_features: true
  global_pool: "mean"  # mean, max, add

training:
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 5
