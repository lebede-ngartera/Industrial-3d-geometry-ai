# GeoFusion AI — Default Configuration
# ======================================

project:
  name: "geofusion"
  seed: 42
  device: "cuda"  # "cuda" or "cpu"
  output_dir: "outputs"
  log_dir: "logs"

data:
  dataset: "modelnet40"  # modelnet40, shapenet, abc
  data_root: "data/raw"
  num_points: 2048
  use_normals: true
  batch_size: 32
  num_workers: 4
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

geometry_encoder:
  backbone: "pointnet2"  # pointnet2, dgcnn, gnn
  embed_dim: 256
  dropout: 0.3

text_encoder:
  backbone: "sentence-transformers/all-MiniLM-L6-v2"
  embed_dim: 256
  freeze_backbone: true
  projection_dim: 256

multimodal:
  temperature: 0.07
  embed_dim: 256
  use_projection: true
  projection_hidden: 512

training:
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"  # cosine, step, plateau
  warmup_epochs: 10
  gradient_clip: 1.0
  early_stopping_patience: 20
  save_every: 10

retrieval:
  index_type: "IVFFlat"  # Flat, IVFFlat, IVFPQ
  nlist: 100
  nprobe: 10
  top_k: 10
  metric: "cosine"  # cosine, l2

anomaly:
  method: "reconstruction"  # reconstruction, density, ensemble
  threshold_percentile: 95
  latent_dim: 64

logging:
  use_wandb: false
  wandb_project: "geofusion"
  wandb_entity: null
  log_every: 10
  visualize_every: 50
